<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe JS</title>
    <link rel="stylesheet" href="./05-tictactoe.css">
</head>

<body>
    <h1 class="title" >Tic Tac Toe JS</h1>
    <form class="playersForm">
        <label for="player01" class="players">Jogador 01:</label>
        <input type="text" name="player01" id="player01" required>
        <label for="player02" class="players">Jogador 02:</label>
        <input type="text" name="player02" id="player02" required>
        <button id="createNewGameBtn" type="button">Iniciar Partida</button>
    </form>
    <h2 class="subtitle" >Turno de </h2>
    <p class="playerTurn">...</p>
    <table>
        <caption class="titleGame" >Jogo da Velha</caption>
        <tbody class="plataform">
            <tr>
                <td data-row="1" data-col="1"></td>
                <td data-row="1" data-col="2"></td>
                <td data-row="1" data-col="3"></td>
            </tr>
            <tr>
                <td data-row="2" data-col="4"></td>
                <td data-row="2" data-col="5"></td>
                <td data-row="2" data-col="6"></td>
            </tr>
            <tr>
                <td data-row="3" data-col="7"></td>
                <td data-row="3" data-col="8"></td>
                <td data-row="3" data-col="9"></td>
            </tr>
        </tbody>
    </table>
    <main>
    </main>
    <script src="./05-tictactoe.js"></script>
</body>

</html>
