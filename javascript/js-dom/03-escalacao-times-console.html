<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escalação de Time</title>
  </head>
  <body>
    <main>
      <section class="app">
        <h1>Escale seu Time</h1>
        <p>Prepare a escalação do seu time:</p>
        <button type="submit" id="submitPlayer">
          Escalar Jogador
        </button>
        <button type="button" id="deletePlayer" disabled>Remover Jogador da Escalação</button>
        <form class="deletePlayerForm" hidden>
          <br>
          <label for="deletedPlayer">Qual é o número do jogador que deseja remover?</label>
          <input type="number" name="deletedPlayer" id="deletedPlayer" min="1" max="99">
          <button type="submit" id="deletePlayerId">Confirmar Remoção</button>
        </form>
      </section>
      <form class="lineupForm">
        <section class="playerInfos"></section>
      </form>
      <section class="teamLineup"></section>
    </main>
    <script src="./03-escalacao-times.js"></script>
  </body>
</html>
